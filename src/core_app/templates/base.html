<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ad-Project{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Ad-Project</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Все объявления</a></li>
				{% if user.is_authenticated %}
                <li class="nav-item"><a class="nav-link text-warning" href="{% url 'ad_create' %}">+ Создать</a></li>
				<li class="nav-item"><a class="nav-link" href="{% url 'profile' %}">Профиль</a></li>
				{% else %}
                <li class="nav-item"><a class="nav-link" href="{% url 'login' %}">Авторизация</a></li>
				{% endif %}
            </ul>
        </div>
    </div>
</nav>

<div class="container min-vh-100">
    {% block content %}
    {% endblock %}
</div>

<footer class="bg-dark text-white text-center py-3 mt-5">
    <p class="mb-0">© 2026 Ad-Project. Учебный проект.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
