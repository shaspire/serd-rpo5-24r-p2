{% extends 'base.html' %}

{% block title %}Удаление объявления - Ad-Project{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="alert alert-danger shadow-sm">
            <h3 class="alert-heading">Вы уверены?</h3>
            <p>Вы действительно хотите удалить объявление <strong>"{{ ad }}"</strong>? Это действие нельзя отменить.</p>
            <hr>
            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Да, удалить</button>
                <a href="{% url 'ad_detail' uuid=ad.uuid %}" class="btn btn-secondary">Отмена</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
